info:
  name: Get States
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}locations/states?zone_id={{zone_id}}"
  params:
    - name: zone_id
      value: "{{zone_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

