info:
  name: Get LGAs
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}locations/lgas?state_id={{state_id}}"
  params:
    - name: state_id
      value: "{{state_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

