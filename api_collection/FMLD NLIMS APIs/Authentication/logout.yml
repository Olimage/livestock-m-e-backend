info:
  name: logout
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}auth/sign-out"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{baseUrl}}auth/sign-out"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: host
          value: 127.0.0.1:8000
        - name: connection
          value: close
        - name: x-powered-by
          value: PHP/8.3.14
        - name: cache-control
          value: no-cache, private
        - name: date
          value: Thu, 05 Mar 2026 13:26:41 GMT
        - name: content-type
          value: application/json
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-allow-methods
          value: POST, GET, OPTIONS, PUT, DELETE
        - name: access-control-allow-headers
          value: Content-Type, X-Auth-Token, Authorization, Origin
        - name: access-control-expose-headers
          value: Content-Length, Content-Range, X-Content-Range, X-Requested-With, X-Progress
        - name: x-ratelimit-limit
          value: "200"
        - name: x-ratelimit-remaining
          value: "198"
        - name: set-cookie
          value: national_livestock_information_management_system_n_lims_session=PyRFFkHASlr018JOznFBQuY57LzQvNd4X8Iskw6u; expires=Thu, 05 Mar 2026 15:26:41 GMT; Max-Age=7200; path=/; httponly; samesite=lax
      body:
        type: json
        data: |-
          {
            "status": true,
            "message": "Logged out successfully"
          }
